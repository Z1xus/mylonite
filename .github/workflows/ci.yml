name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_CACHE_SIZE: 2G

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      plugin: ${{ steps.filter.outputs.plugin }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'server/**'
              - 'crates/**'
              - '.github/workflows/ci.yml'
            plugin:
              - 'plugin/**'
              - '.github/workflows/ci.yml'

  server:
    name: Server
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy

      - uses: mozilla-actions/sccache-action@v0.0.10

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          shared-key: ci-lalalalalala
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -p mylonite --all-targets -- -D warnings

      - name: Test
        run: cargo test -p mylonite

      - name: sccache stats
        if: always()
        run: sccache --show-stats

  plugin:
    name: Plugin
    needs: changes
    if: needs.changes.outputs.plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            plugin/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('plugin/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install
        working-directory: plugin
        run: bun install --frozen-lockfile

      - name: Test
        working-directory: plugin
        run: bun run test

      - name: Build
        working-directory: plugin
        run: bun run build
