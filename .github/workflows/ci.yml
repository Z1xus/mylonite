name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -p mylonite --all-targets -- -D warnings

      - name: Test
        run: cargo test -p mylonite

  plugin:
    name: Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('plugin/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install
        working-directory: plugin
        run: bun install --frozen-lockfile

      - name: Test
        working-directory: plugin
        run: bun run test

      - name: Build
        working-directory: plugin
        run: bun run build
