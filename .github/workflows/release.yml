name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  plugin:
    name: Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            plugin/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('plugin/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install plugin deps
        working-directory: plugin
        run: bun install --frozen-lockfile

      - name: Test plugin
        working-directory: plugin
        run: bun run test

      - name: Build plugin
        working-directory: plugin
        run: bun run build

      - name: Package plugin
        shell: bash
        run: |
          mkdir -p dist/plugin
          cp plugin/main.js plugin/manifest.json plugin/styles.css dist/plugin/
          cp plugin/main.js plugin/manifest.json plugin/styles.css dist/
          (cd dist/plugin && zip -r ../mylonite-obsidian-plugin.zip main.js manifest.json styles.css)

      - uses: actions/upload-artifact@v4
        with:
          name: mylonite-obsidian-plugin
          path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
            dist/mylonite-obsidian-plugin.zip

  server:
    name: Server ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: mylonite
            asset: mylonite-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: mylonite
            asset: mylonite-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: mylonite.exe
            asset: mylonite-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: ${{ matrix.target }}

      - name: Build server
        run: cargo build --release -p mylonite --target ${{ matrix.target }}

      - name: Package server
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: mylonite-${{ matrix.target }}
          path: dist/${{ matrix.asset }}

  docker:
    name: Docker
    needs: server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mylonite-x86_64-unknown-linux-gnu
          path: dist

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub Release
    needs: [plugin, server, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: mylonite-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
